<!doctype html>
<html lang="fr">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Plante</title>
  <meta name="description" content="Fiche plante pratique avec arrosage chiffré et conseils concrets." />
  <link rel="stylesheet" href="assets/css/style.css" />
</head>
<body>
  <div class="container" id="app">
    <section class="section">
      <p class="small">Chargement…</p>
    </section>
  </div>

  <script>
    (async function () {
      const app = document.getElementById("app");
      const params = new URLSearchParams(window.location.search);
      const slug = params.get("slug");

      function renderError(title, details) {
        app.innerHTML = `
          <section class="section">
            <h1>${title}</h1>
            <p class="small">${details || ""}</p>
            <p><a href="index.html">Retour accueil</a></p>
          </section>
        `;
      }

      if (!slug) {
        renderError("Plante non spécifiée", "Utilise : plante.html?slug=nom-de-la-plante");
        return;
      }

      try {
        const res = await fetch("data/plantes.json", { cache: "no-store" });
        if (!res.ok) {
          throw new Error(`HTTP ${res.status} sur data/plantes.json`);
        }

        const data = await res.json();
        if (!Array.isArray(data)) {
          throw new Error("Le JSON chargé n'est pas un tableau.");
        }

        const plante = data.find(p => p && p.slug === slug);
        if (!plante) {
          renderError("Plante introuvable", `Slug demandé : ${slug}`);
          return;
        }

        document.title = `${plante.nom || "Plante"} — mode d’emploi`;

        const metaDesc = document.querySelector('meta[name="description"]');
        if (metaDesc) {
          metaDesc.setAttribute(
            "content",
            `Conseils concrets pour ${plante.nom || "cette plante"} : arrosage en centilitres, ajustements, diagnostic rapide.`
          );
        }

        const image = plante.image || "assets/images/placeholder.jpg";
        const chipsHtml = (plante.chips || [])
          .map(c => `<span class="chip">${c}</span>`)
          .join("");

        const arrosageHtml = (plante.arrosage || [])
          .map(a => `
            <tr>
              <td>${a.pot || ""}</td>
              <td><strong>${a.dose || ""}</strong></td>
              <td>${a.freq || ""}</td>
            </tr>
          `)
          .join("");

        const ajustementsHtml = (plante.ajustements || [])
          .map(a => `
            <p>
              <strong>${a.titre || ""}</strong><br>
              <span class="small">${a.desc || ""}</span>
            </p>
          `)
          .join("");

        const sosHtml = (plante.sos || [])
          .map(s => `
            <details>
              <summary>${s.q || ""}</summary>
              <p>${s.a || ""}</p>
            </details>
          `)
          .join("");

        const erreursHtml = Array.isArray(plante.erreurs) && plante.erreurs.length
          ? `
            <section class="section">
              <div class="sectionHeader">
                <h2 class="sectionTitle">Erreurs fréquentes</h2>
                <p class="sectionSub">Les faux bons réflexes qui abîment la plante.</p>
              </div>
              <div class="faq">
                ${plante.erreurs.map(e => {
                  if (typeof e === "string") {
                    return `
                      <details>
                        <summary>${e}</summary>
                        <p></p>
                      </details>
                    `;
                  }
                  return `
                    <details>
                      <summary>${e.titre || ""}</summary>
                      <p>${e.desc || ""}</p>
                    </details>
                  `;
                }).join("")}
              </div>
            </section>
          `
          : "";

        app.innerHTML = `
          <div class="small" style="margin-top:18px">
            <a href="index.html">← Retour</a>
          </div>

          <section class="plantHero">
            <div class="plantHeroMedia">
              <div class="bg" style="background-image:url('${image}')"></div>
              <div class="plantHeroContent">
                <div class="kicker">${plante.categorie || "Fiche plante"}</div>
                <h1>${plante.nom || ""}</h1>

                <div class="chips">
                  ${chipsHtml}
                </div>

                <p class="small" style="color:rgba(255,255,255,.78);max-width:70ch;margin:0">
                  ${plante.intro || ""}
                </p>
              </div>
            </div>
          </section>

          <section class="section">
            <div class="sectionHeader">
              <h2 class="sectionTitle">Arrosage</h2>
              <p class="sectionSub">
                Référence pour ${plante.climat_reference || "climat standard"} —
                ${plante.saison_reference || "saison actuelle"}
              </p>
            </div>

            <table class="table">
              <thead>
                <tr><th>Pot</th><th>Dose</th><th>Fréquence</th></tr>
              </thead>
              <tbody>
                ${arrosageHtml}
              </tbody>
            </table>

            <div class="callout" style="margin-top:14px">
              <strong>Risque principal :</strong> ${plante.risque_principal || "—"}
            </div>
          </section>

          <section class="section">
            <div class="sectionHeader">
              <h2 class="sectionTitle">Ajustements</h2>
              <p class="sectionSub">Observe → applique → réévalue sous 7 jours.</p>
            </div>
            ${ajustementsHtml || '<p class="small">Aucun ajustement renseigné.</p>'}
          </section>

          <section class="section">
            <div class="grid2">
              <div class="card">
                <div class="cardPad">
                  <h2>Lumière</h2>
                  <p class="small">${plante.lumiere || ""}</p>
                </div>
              </div>

              <div class="card">
                <div class="cardPad">
                  <h2>Température</h2>
                  <p class="small">${plante.temperature || ""}</p>
                </div>
              </div>
            </div>
          </section>

          ${erreursHtml}

          <section class="section">
            <div class="sectionHeader">
              <h2 class="sectionTitle">SOS</h2>
              <p class="sectionSub">${plante.usage || ""}</p>
            </div>
            <div class="faq">
              ${sosHtml || '<p class="small">Aucun diagnostic rapide renseigné.</p>'}
            </div>
          </section>

          <section class="section">
            <div class="sectionHeader">
              <h2 class="sectionTitle">Solution recommandée</h2>
            </div>
            <div class="solution">
              <strong>${(plante.solution && plante.solution.titre) || ""}</strong>
              <div class="small">${(plante.solution && plante.solution.desc) || ""}</div>
            </div>
          </section>

          <section class="section" style="padding-top:0">
            <div class="small">
              Catégorie : ${plante.categorie || ""} ·
              Usage : ${plante.usage || ""} ·
              Climat : ${plante.climat_reference || ""} ·
              Saison : ${plante.saison_reference || ""}
            </div>
          </section>
        `;

      } catch (error) {
        console.error("Erreur chargement plante :", error);
        renderError("Erreur de chargement", String(error));
      }
    })();
  </script>
</body>
</html>
