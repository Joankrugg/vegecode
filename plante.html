<!doctype html>
<html lang="fr">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Plante</title>
  <meta name="description" content="Fiche plante pratique avec arrosage chiffré et conseils concrets." />
  <link rel="stylesheet" href="assets/css/style.css" />
</head>
<body>
  <div class="container" id="app">
    <section class="section">
      <p class="small">Chargement…</p>
    </section>
  </div>

  <script>
    (async function () {
      const app = document.getElementById("app");
      const params = new URLSearchParams(window.location.search);
      const slug = params.get("slug");

      function renderError(title, details) {
        app.innerHTML = `
          <section class="section">
            <h1>${title}</h1>
            <p class="small">${details || ""}</p>
            <p><a href="index.html">Retour accueil</a></p>
          </section>
        `;
      }

      if (!slug) {
        renderError("Plante non spécifiée", "Utilise : plante.html?slug=nom-de-la-plante");
        return;
      }

      try {
        const res = await fetch("data/plantes.json", { cache: "no-store" });
        const data = await res.json();

        const plante = data.find(p => p && p.slug === slug);
        if (!plante) {
          renderError("Plante introuvable", `Slug demandé : ${slug}`);
          return;
        }

        document.title = `${plante.nom || "Plante"} — mode d’emploi`;

        // IMAGE
        const image =
          (typeof plante.image === "string" && plante.image) ||
          (plante.image && plante.image.url) ||
          "assets/images/placeholder.jpg";

        // CHIPS
        const chipsHtml = (plante.chips || [])
          .map(c => `<span class="chip">${c}</span>`)
          .join("");

        // BONUS CHIPS
        const extraChips = `
          ${plante.difficulte ? `<span class="chip">niveau : ${plante.difficulte}</span>` : ""}
          ${plante.toxicite?.animaux ? `<span class="chip danger">toxique animaux</span>` : ""}
        `;

        // ARROSAGE
        const arrosageHtml = (plante.arrosage || [])
          .map(a => {
            if ("pot_cm" in a) {
              return `
                <tr>
                  <td>${a.pot_cm} cm</td>
                  <td><strong>${a.dose_cl} cl</strong></td>
                  <td>tous les ${a.freq_jours} jours</td>
                </tr>
              `;
            }
            return `
              <tr>
                <td>${a.pot || ""}</td>
                <td><strong>${a.dose || ""}</strong></td>
                <td>${a.freq || ""}</td>
              </tr>
            `;
          })
          .join("");

        // AJUSTEMENTS
        const ajustementsHtml = (plante.ajustements || [])
          .map(a => `
            <p>
              <strong>${a.titre || a.condition || ""}</strong><br>
              <span class="small">${a.desc || a.action || ""}</span>
            </p>
          `)
          .join("");

        // SOS
        const sosHtml = (plante.sos || [])
          .map(s => {
            if (s.probleme) {
              return `
                <details>
                  <summary>${s.probleme}</summary>
                  <p><strong>Cause :</strong> ${s.cause || ""}</p>
                  <p><strong>Solution :</strong> ${s.solution || ""}</p>
                </details>
              `;
            }
            return `
              <details>
                <summary>${s.q || ""}</summary>
                <p>${s.a || ""}</p>
              </details>
            `;
          })
          .join("");

        // CONDITIONS
        const lumiere =
          plante.conditions?.lumiere
            ? `${plante.conditions.lumiere.type || ""} (${plante.conditions.lumiere.intensite || ""})`
            : plante.lumiere || "";

        const temperature =
          plante.conditions?.temperature
            ? `${plante.conditions.temperature.min}°C à ${plante.conditions.temperature.max}°C`
            : plante.temperature || "";

        const usage = Array.isArray(plante.usage)
          ? plante.usage.join(", ")
          : (plante.usage || "");

        app.innerHTML = `
          <div class="small"><a href="index.html">← Retour</a></div>

          <section class="plantHero">
            <div class="plantHeroMedia">
              <div class="bg" style="background-image:url('${image}')"></div>
              <div class="plantHeroContent">
                <div class="kicker">${plante.categorie || ""}</div>
                <h1>${plante.nom || ""}</h1>

                <div class="chips">
                  ${chipsHtml}
                  ${extraChips}
                </div>

                <p class="white">${plante.intro || ""}</p>
              </div>
            </div>
          </section>

          <section class="section">
            <h2>Arrosage</h2>
            <table class="table">
              <thead>
                <tr><th>Pot</th><th>Dose</th><th>Fréquence</th></tr>
              </thead>
              <tbody>${arrosageHtml}</tbody>
            </table>

            <div class="callout">
              <strong>Risque :</strong> ${plante.risque_principal || ""}
            </div>
          </section>

          <section class="section">
            <h2>Ajustements</h2>
            ${ajustementsHtml || "<p class='small'>Aucun</p>"}
          </section>

          <section class="section">
            <div class="grid2">
              <div class="card"><div class="cardPad">
                <h2>Lumière</h2>
                <p class="small">${lumiere}</p>
              </div></div>

              <div class="card"><div class="cardPad">
                <h2>Température</h2>
                <p class="small">${temperature}</p>
              </div></div>
            </div>
          </section>

          <section class="section">
            <h2>SOS</h2>
            <div class="faq">${sosHtml}</div>
          </section>

          <section class="section">
            <h2>Infos</h2>
            <div class="small">
              Usage : ${usage} ·
              Climat : ${plante.climat_reference || ""} ·
              Saison : ${plante.saison_reference || ""}
            </div>
          </section>
        `;
      } catch (e) {
        renderError("Erreur", e.message);
      }
    })();
  </script>
</body>
</html>
